<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS2 GoonerGang</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0f14; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { background: #13161e; border-bottom: 2px solid #ff6b00; padding: 0 24px; height: 64px; display: flex; align-items: center; }
    .header-inner { max-width: 960px; width: 100%; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { display: flex; align-items: baseline; gap: 8px; }
    .logo-cs { color: #ff6b00; font-size: 22px; font-weight: 800; letter-spacing: 1px; }
    .logo-lb { color: #94a3b8; font-size: 13px; font-weight: 600; letter-spacing: 3px; }
    #refreshBtn { background: #ff6b00; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    #refreshBtn:hover { background: #e05a00; }
    #refreshBtn:disabled { background: #333; cursor: not-allowed; }
    main { max-width: 960px; margin: 32px auto; padding: 0 16px; }
    .updated-info { font-size: 12px; color: #64748b; margin-bottom: 16px; text-align: right; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 12px; color: #64748b; margin-right: 4px; }
    .time-btn { background: #1a1e2a; border: 1px solid #2a2e3d; color: #94a3b8; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .time-btn:hover { border-color: #ff6b00; color: #ff6b00; }
    .time-btn.active { background: #ff6b00; border-color: #ff6b00; color: #fff; }
    .sort-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .sort-btn { background: #1a1e2a; border: 1px solid #2a2e3d; color: #94a3b8; padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
    .sort-btn:hover { border-color: #ff6b00; color: #ff6b00; }
    .sort-btn.active { background: #ff6b00; border-color: #ff6b00; color: #fff; }
    .podium { display: flex; justify-content: center; align-items: flex-end; gap: 12px; margin-bottom: 36px; }
    .podium-card { background: #1a1e2a; border-radius: 12px; padding: 24px 16px; text-align: center; flex: 1; max-width: 220px; border: 2px solid transparent; }
    .podium-card.rank-1 { border-color: #FFD700; transform: translateY(-14px); }
    .podium-card.rank-2 { border-color: #C0C0C0; }
    .podium-card.rank-3 { border-color: #CD7F32; }
    .podium-medal { margin-bottom: 10px; font-size: 26px; }
    .podium-avatar { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 10px; display: block; border: 3px solid #2a2e3d; background: #2a2e3d; object-fit: cover; }
    .podium-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #f1f5f9; }
    .podium-val { font-size: 22px; font-weight: 800; color: #ff6b00; }
    .podium-label { font-size: 10px; color: #64748b; letter-spacing: 1px; margin-top: 3px; }
    .podium-sub { font-size: 11px; color: #475569; margin-top: 6px; }
    .table-wrap { overflow-x: auto; border-radius: 12px; }
    .leaderboard-table { width: 100%; border-collapse: collapse; background: #13161e; border-radius: 12px; overflow: hidden; min-width: 780px; }
    .leaderboard-table thead tr { background: #1a1e2a; border-bottom: 1px solid #2a2e3d; }
    .leaderboard-table th { padding: 12px 12px; text-align: left; font-size: 11px; font-weight: 600; color: #64748b; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; user-select: none; transition: color 0.2s; white-space: nowrap; }
    .leaderboard-table th:hover { color: #ff6b00; }
    .leaderboard-table th.sorted { color: #ff6b00; }
    .leaderboard-table th .arrow { margin-left: 4px; opacity: 0.5; font-size: 10px; }
    .leaderboard-table th.sorted .arrow { opacity: 1; }
    .leaderboard-table td { padding: 14px 12px; border-bottom: 1px solid #1a1e2a; font-size: 14px; white-space: nowrap; }
    .leaderboard-table tbody tr:last-child td { border-bottom: none; }
    .leaderboard-table tbody tr:hover { background: #1a1e2a; }
    .player-cell { display: flex; align-items: center; gap: 12px; }
    .player-avatar { width: 38px; height: 38px; border-radius: 6px; background: #2a2e3d; object-fit: cover; flex-shrink: 0; }
    .player-name { font-weight: 600; color: #f1f5f9; }
    .player-steam { font-size: 11px; color: #64748b; }
    .rank-badge { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .r1 { background: rgba(255,215,0,0.15); color: #FFD700; }
    .r2 { background: rgba(192,192,192,0.15); color: #C0C0C0; }
    .r3 { background: rgba(205,127,50,0.15); color: #CD7F32; }
    .rn { background: #1a1e2a; color: #64748b; }
    .hi-val { font-weight: 800; font-size: 15px; color: #ff6b00; }
    .null-val { color: #2a2e3d; }
    .matches-badge { background: #1a1e2a; color: #94a3b8; font-size: 11px; padding: 2px 8px; border-radius: 4px; border: 1px solid #2a2e3d; }
    .ext-link { color: #94a3b8; text-decoration: none; font-size: 12px; padding: 4px 10px; border: 1px solid #2a2e3d; border-radius: 4px; transition: all 0.2s; white-space: nowrap; }
    .ext-link:hover { border-color: #ff6b00; color: #ff6b00; }
    .loading { text-align: center; padding: 80px 0; color: #64748b; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2a2e3d; border-top-color: #ff6b00; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .info-banner { background: rgba(255,107,0,0.08); border: 1px solid rgba(255,107,0,0.25); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #94a3b8; }

    /* Mode toggle */
    .mode-toggle { display: flex; gap: 0; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #2a2e3d; width: fit-content; }
    .mode-btn { background: #1a1e2a; border: none; color: #94a3b8; padding: 8px 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
    .mode-btn.active { background: #ff6b00; color: #fff; }
    .mode-btn:hover:not(.active) { color: #ff6b00; }
    .mode-label { font-size: 11px; color: #475569; margin-bottom: 8px; }
    .attribution { text-align: center; margin-top: 32px; font-size: 12px; color: #475569; }
    .attribution a { color: #ff6b00; text-decoration: none; }
    @media (max-width: 600px) {
      .podium { flex-direction: column; align-items: center; }
      .podium-card { max-width: 100%; transform: none !important; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-cs">CS2</span>
      <span class="logo-lb">GONNER-BOARD</span>
    </div>
    <button id="refreshBtn" onclick="loadAll()">&#x21BB;&nbsp;Aktualisieren</button>
  </div>
</header>

<main>
  <div class="updated-info" id="updatedAt"></div>
  <div class="info-banner">
    &#9432;&nbsp; Daten via <strong>Leetify</strong> &mdash; CS2 only. Zeitraum w&auml;hlbar.<br>
    &#9432;&nbsp;<strong> Um angezeigt zu werden, muss man Leetify User sein. Das bedeutet Steam mit Leetify einmalig verbinden und Profil -&gt; public.</strong>
  </div>

  <div class="filter-row">
    <span class="filter-label">Zeitraum:</span>
    <button class="time-btn active" data-days="1"  onclick="setDays(1)">24h</button>
    <button class="time-btn" data-days="7"  onclick="setDays(7)">7 Tage</button>
    <button class="time-btn"        data-days="14" onclick="setDays(14)">14 Tage</button>
    <button class="time-btn"        data-days="30" onclick="setDays(30)">30 Tage</button>
    <button class="time-btn"        data-days="90" onclick="setDays(90)">90 Tage</button>
  </div>

  <div class="mode-label">Ansicht:</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeMatch"   onclick="setMode('match')">&#9654; Match-Modus &nbsp;<small>(Zeitraum-gefiltert)</small></button>
    <button class="mode-btn"        id="modeAlltime" onclick="setMode('alltime')">&#9733; All-Time Ratings</button>
  </div>
  <div class="sort-bar" id="sortBar"></div>

  <div id="container">
    <div class="loading"><div class="spinner"></div><p>Lade Leetify-Daten...</p></div>
  </div>

  <div class="attribution">Data provided by <a href="https://leetify.com" target="_blank">Leetify</a></div>
</main>

<script>
const PLAYERS = [
    { steamId64: "76561198212183875", displayName: "Lehon" },
    { steamId64: "76561198010694730", displayName: "Pata"  },
    { steamId64: "76561198929555797", displayName: "Malwie"  },
    { steamId64: "76561198205465816", displayName: "AimDemon"  },
    { steamId64: "76561198068774293", displayName: "Stabils"  },
    { steamId64: "76561197974640447", displayName: "Tolgus"  },
    { steamId64: "76561198189619710", displayName: "GoonerBoy"  },
    { steamId64: "76561199208386886", displayName: "Zven"  }
];

const SORT_MATCH = [
  { key: "matches",       label: "Matches",       suffix: "",  fmt: function(v){ return v; } },
  { key: "leetifyRating", label: "Leetify Rating",suffix: "",  fmt: function(v){ return v.toFixed(2); } },
  { key: "winRate",       label: "Win %",         suffix: "%", fmt: function(v){ return v.toFixed(1); } },
  { key: "hsPercent",     label: "HS %",          suffix: "%", fmt: function(v){ return v.toFixed(1); } },
  { key: "accuracy",      label: "Accuracy",      suffix: "%", fmt: function(v){ return v.toFixed(1); } },
  { key: "sprayAccuracy", label: "Spray",         suffix: "%", fmt: function(v){ return v.toFixed(1); } },
  { key: "reactionTime",  label: "Reaction Time", suffix: "ms",fmt: function(v){ return Math.round(v); } }
];
const SORT_ALLTIME = [
  { key: "leetifyRating", label: "Leetify Rating",suffix: "",  fmt: function(v){ return v.toFixed(2); } },
  { key: "aim",           label: "Aim",           suffix: "",  fmt: function(v){ return v.toFixed(1); } },
  { key: "positioning",   label: "Positioning",   suffix: "",  fmt: function(v){ return v.toFixed(1); } },
  { key: "utility",       label: "Utility",       suffix: "",  fmt: function(v){ return v.toFixed(1); } },
  { key: "clutch",        label: "Clutch",        suffix: "",  fmt: function(v){ return v.toFixed(3); } },
  { key: "openingDuels",  label: "Opening Duels", suffix: "%", fmt: function(v){ return v.toFixed(1); } },
  { key: "flashAssists",  label: "Flash Ast",     suffix: "",  fmt: function(v){ return v.toFixed(2); } },
  { key: "premierRank",   label: "Premier",       suffix: "",  fmt: function(v){ return Math.round(v).toLocaleString("de-DE"); } },
  { key: "winRate",       label: "Win % (all)",   suffix: "%", fmt: function(v){ return v.toFixed(1); } }
];
var currentMode = "match";
function SORT_OPTIONS() { return currentMode === "match" ? SORT_MATCH : SORT_ALLTIME; }

var currentSort = "leetifyRating";
var currentDays = 1;
var allPlayers  = [];

async function apiFetch(query) {
  var res = await fetch("/api/leetify" + query);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById("modeMatch").classList.toggle("active",   mode === "match");
  document.getElementById("modeAlltime").classList.toggle("active", mode === "alltime");
  // Reset sort to first option of new mode
  currentSort = SORT_OPTIONS()[0].key;
  buildSortBar();
  renderSorted();
}

function setDays(d) {
  currentDays = d;
  document.querySelectorAll(".time-btn").forEach(function(b){
    b.classList.toggle("active", parseInt(b.dataset.days) === d);
  });
  loadAll();
}

function cutoffDate() {
  var d = new Date();
  d.setDate(d.getDate() - currentDays);
  return d;
}

async function fetchSteamData(steamId64) {
  try {
    var res = await fetch("/api/steam-avatar?steamId=" + steamId64);
    if (!res.ok) return { avatar: null, steamName: null };
    var data = await res.json();
    return { avatar: data.avatar || null, steamName: data.steamName || null };
  } catch(e) { return { avatar: null, steamName: null }; }
}

async function fetchPlayer(player) {
  try {
    var steamData = await fetchSteamData(player.steamId64);
    var profile = await apiFetch("?steamId=" + player.steamId64);

    var steamName  = profile.name || steamData.steamName || player.displayName;
    var profileUrl = "https://leetify.com/app/profile/" + player.steamId64;
    var avatar     = steamData.avatar;

    var allMatches = profile.recent_matches || [];
    var cutoff = cutoffDate();
    var matches = allMatches.filter(function(g) {
      return g.finished_at && new Date(g.finished_at) >= cutoff;
    });
    var matchesForCalc = matches.length ? matches : allMatches;

    var stats  = profile.stats  || {};
    var rating = profile.rating || {};
    var ranks  = profile.ranks  || {};

    var winRate = matchesForCalc.length
      ? (matchesForCalc.filter(function(m){ return m.outcome === "win"; }).length / matchesForCalc.length) * 100
      : (profile.winrate != null ? profile.winrate * 100 : null);

    var lRatings = matchesForCalc.map(function(m){ return m.leetify_rating; }).filter(function(v){ return v != null; });
    var leetifyRating = ranks.leetify != null
      ? ranks.leetify
      : (lRatings.length ? lRatings.reduce(function(a,b){ return a+b; }, 0) / lRatings.length : null);

    var hsPercent    = stats.accuracy_head != null ? stats.accuracy_head : null;
    var flashAssists = stats.flashbang_hit_foe_per_flashbang != null ? stats.flashbang_hit_foe_per_flashbang : null;
    var matchCount   = matches.length;

    // Match-mode fields: average over filtered matches (or all recent if none in window)
    var calcMatches = matchesForCalc;
    function avgField(arr, key) {
      var vals = arr.map(function(m){ return m[key]; }).filter(function(v){ return v != null; });
      return vals.length ? vals.reduce(function(a,b){ return a+b; }, 0) / vals.length : null;
    }
    var accuracy     = avgField(calcMatches, "accuracy_enemy_spotted");
    var sprayAccuracy = avgField(calcMatches, "spray_accuracy");
    var reactionTime  = avgField(calcMatches, "reaction_time_ms");

    var ctOD = stats.ct_opening_duel_success_percentage != null ? stats.ct_opening_duel_success_percentage : null;
    var tOD  = stats.t_opening_duel_success_percentage  != null ? stats.t_opening_duel_success_percentage  : null;
    var openingDuels = (ctOD != null && tOD != null) ? (ctOD + tOD) / 2 : (ctOD != null ? ctOD : (tOD != null ? tOD : null));

    return {
      displayName: player.displayName, steamName: steamName, avatar: avatar,
      profileUrl: profileUrl, steamId64: player.steamId64, matches: matchCount,
      kd: null, hsPercent: hsPercent, winRate: winRate, adr: null, kills: null,
      leetifyRating: leetifyRating, flashAssists: flashAssists,
      aim:          rating.aim         != null ? rating.aim         : null,
      positioning:  rating.positioning != null ? rating.positioning : null,
      utility:      rating.utility     != null ? rating.utility     : null,
      premierRank:  ranks.premier      != null ? ranks.premier      : null,
      clutch:       rating.clutch      != null ? rating.clutch      : null,
      openingDuels: openingDuels,
      accuracy:     accuracy,
      sprayAccuracy: sprayAccuracy,
      reactionTime:  reactionTime
    };
  } catch(e) {
    var fallbackSteam = await fetchSteamData(player.steamId64).catch(function(){ return { avatar: null, steamName: null }; });
    return {
      displayName: player.displayName, steamName: fallbackSteam.steamName || player.displayName,
      avatar: fallbackSteam.avatar, profileUrl: null, steamId64: player.steamId64,
      matches: null, kd: null, hsPercent: null, winRate: null, adr: null, kills: null,
      leetifyRating: null, flashAssists: null, clutch: null, openingDuels: null,
      aim: null, positioning: null, utility: null, premierRank: null, accuracy: null, sprayAccuracy: null, reactionTime: null, error: true
    };
  }
}

async function loadAll() {
  var btn = document.getElementById("refreshBtn");
  var container = document.getElementById("container");
  btn.disabled = true; btn.innerHTML = "L&auml;dt...";
  container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Lade Leetify-Daten...</p></div>';
  allPlayers = await Promise.all(PLAYERS.map(fetchPlayer));
  document.getElementById("updatedAt").textContent = "Zuletzt aktualisiert: " + new Date().toLocaleString("de-DE");
  buildSortBar();
  renderSorted();
  btn.disabled = false; btn.innerHTML = "&#x21BB;&nbsp;Aktualisieren";
}

function buildSortBar() {
  document.getElementById("sortBar").innerHTML = SORT_OPTIONS.map(function(opt) {
    return '<button class="sort-btn' + (opt.key === currentSort ? ' active' : '') +
      '" onclick="setSort(\'' + opt.key + '\')">' + opt.label + '</button>';
  }).join("");
}

function setSort(key) { currentSort = key; buildSortBar(); renderSorted(); }

function fmtVal(player, key) {
  var opt = SORT_OPTIONS().find(function(o){ return o.key === key; });
  var raw = player[key];
  if (raw == null) return '<span class="null-val">&#8212;</span>';
  return opt.fmt(raw) + (opt.suffix || "");
}

var MEDALS = ["&#129351;","&#129352;","&#129353;"];

function renderSorted() {
  // Sort: players with null for current key go to bottom
  var sorted = allPlayers.slice().sort(function(a, b) {
    var aVal = a[currentSort];
    var bVal = b[currentSort];
    var aNull = aVal == null || isNaN(parseFloat(aVal));
    var bNull = bVal == null || isNaN(parseFloat(bVal));
    if (aNull && bNull) return 0;
    if (aNull) return 1;
    if (bNull) return -1;
    return parseFloat(bVal) - parseFloat(aVal);
  });

  var opt  = SORT_OPTIONS().find(function(o){ return o.key === currentSort; });
  var top3 = sorted.slice(0, 3);
  var order = top3.length === 3 ? [1, 0, 2] : top3.map(function(_, i){ return i; });

  var podium = '<div class="podium">';
  order.forEach(function(i) {
    if (!top3[i]) return;
    var p = top3[i]; var r = i + 1;
    var dispVal = p[opt.key] != null ? opt.fmt(p[opt.key]) + (opt.suffix || "") : "&#8212;";
    podium += '<div class="podium-card rank-' + r + '">' +
      '<div class="podium-medal">' + (MEDALS[i] || "#" + r) + '</div>' +
      (p.avatar ? '<img class="podium-avatar" src="' + p.avatar + '" onerror="this.style.visibility=\'hidden\'"/>' : '<div class="podium-avatar" style="display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;color:#ff6b00;background:#1a1e2a;">' + p.displayName.charAt(0).toUpperCase() + '</div>') +
      '<div class="podium-name">' + p.displayName + '</div>' +
      '<div class="podium-val">' + dispVal + '</div>' +
      '<div class="podium-label">' + opt.label.toUpperCase() + '</div>' +
      '<div class="podium-sub">' + (p.matches || 0) + ' Matches &middot; ' + currentDays + ' Tage</div>' +
      '</div>';
  });
  podium += '</div>';

  var thDefs = currentMode === "match" ? [
    { key: null,            label: "#"              },
    { key: null,            label: "Spieler"        },
    { key: "matches",       label: "Matches"        },
    { key: "leetifyRating", label: "Leetify Rating" },
    { key: "winRate",       label: "Win %"          },
    { key: "hsPercent",     label: "HS %"           },
    { key: "accuracy",      label: "Accuracy"       },
    { key: "sprayAccuracy", label: "Spray"          },
    { key: "reactionTime",  label: "Reaction Time"  },
    { key: null,            label: ""               }
  ] : [
    { key: null,            label: "#"              },
    { key: null,            label: "Spieler"        },
    { key: "leetifyRating", label: "Leetify Rating" },
    { key: "aim",           label: "Aim"            },
    { key: "positioning",   label: "Positioning"    },
    { key: "utility",       label: "Utility"        },
    { key: "clutch",        label: "Clutch"         },
    { key: "openingDuels",  label: "Opening Duels"  },
    { key: "flashAssists",  label: "Flash Ast"      },
    { key: "premierRank",   label: "Premier"        },
    { key: "winRate",       label: "Win % (all)"    },
    { key: null,            label: ""               }
  ];

  var thead = thDefs.map(function(c) {
    if (!c.key) return '<th>' + c.label + '</th>';
    var active = currentSort === c.key;
    var arrow  = active ? " &#9660;" : " &#8597;";
    return '<th class="' + (active ? "sorted" : "") + '" onclick="setSort(\'' + c.key + '\')">' +
      c.label + '<span class="arrow">' + arrow + '</span></th>';
  }).join("");

  var rows = "";
  sorted.forEach(function(p, idx) {
    var rc = ["r1","r2","r3"][idx] || "rn";
    rows += '<tr>' +
      '<td><div class="rank-badge ' + rc + '">' + (idx + 1) + '</div></td>' +
      '<td><div class="player-cell">' +
        (p.avatar ? '<img class="player-avatar" src="' + p.avatar + '" onerror="this.style.visibility=\'hidden\'"/>' : '<div class="player-avatar" style="display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#ff6b00;background:#1a1e2a;">' + p.displayName.charAt(0).toUpperCase() + '</div>') +
        '<div><div class="player-name">' + p.displayName + '</div>' +
        (p.steamName && p.steamName !== p.displayName ? '<div class="player-steam">' + p.steamName + '</div>' : '') +
        '</div></div></td>' +
      (currentMode === 'match' ? '<td>' + (p.matches != null ? '<span class="matches-badge">' + p.matches + '</span>' : '<span class="null-val">&#8212;</span>') + '</td>' : '') +
      '<td><span class="hi-val">' + fmtVal(p, "leetifyRating") + '</span></td>' +
      (currentMode === "match" ? (
        '<td>' + fmtVal(p, "winRate")      + '</td>' +
        '<td>' + fmtVal(p, "hsPercent")    + '</td>' +
        '<td>' + fmtVal(p, "accuracy")     + '</td>' +
        '<td>' + fmtVal(p, "sprayAccuracy")+ '</td>' +
        '<td>' + fmtVal(p, "reactionTime") + '</td>'
      ) : (
        '<td>' + fmtVal(p, "aim")          + '</td>' +
        '<td>' + fmtVal(p, "positioning")  + '</td>' +
        '<td>' + fmtVal(p, "utility")      + '</td>' +
        '<td>' + fmtVal(p, "clutch")       + '</td>' +
        '<td>' + fmtVal(p, "openingDuels") + '</td>' +
        '<td>' + fmtVal(p, "flashAssists") + '</td>' +
        '<td>' + fmtVal(p, "premierRank")  + '</td>' +
        '<td>' + fmtVal(p, "winRate")      + '</td>'
      )) +
      '<td>' + (p.profileUrl ? '<a class="ext-link" href="' + p.profileUrl + '" target="_blank">Leetify &#8599;</a>' : '') + '</td>' +
      '</tr>';
  });

  document.getElementById("container").innerHTML =
    podium +
    '<div class="table-wrap"><table class="leaderboard-table"><thead><tr>' +
    thead + '</tr></thead><tbody>' + rows + '</tbody></table></div>';
}

(async function init() {
  try {
    var r = await fetch("/api/auth");
    if (!r.ok) { window.location.href = "/login"; return; }
    loadAll();
  } catch(e) {
    window.location.href = "/login";
  }
})();
</script>
</body>
