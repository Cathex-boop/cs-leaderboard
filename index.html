<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS2 Premier Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0f14;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #13161e;
      border-bottom: 2px solid #ff6b00;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
    }

    .header-inner {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { display: flex; align-items: baseline; gap: 8px; }
    .logo-cs { color: #ff6b00; font-size: 22px; font-weight: 800; letter-spacing: 1px; }
    .logo-lb { color: #94a3b8; font-size: 13px; font-weight: 600; letter-spacing: 3px; }

    #refreshBtn {
      background: #ff6b00;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.2s;
    }
    #refreshBtn:hover { background: #e05a00; }
    #refreshBtn:disabled { background: #333; cursor: not-allowed; }

    main {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
    }

    .updated-info {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 16px;
      text-align: right;
    }

    /* Podium */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 36px;
    }

    .podium-card {
      background: #1a1e2a;
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      flex: 1;
      max-width: 220px;
      border: 2px solid transparent;
    }
    .podium-card.rank-1 { border-color: #FFD700; transform: translateY(-14px); }
    .podium-card.rank-2 { border-color: #C0C0C0; }
    .podium-card.rank-3 { border-color: #CD7F32; }

    .podium-medal { font-size: 32px; margin-bottom: 10px; }
    .podium-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      margin: 0 auto 10px;
      display: block;
      border: 3px solid #2a2e3d;
      background: #2a2e3d;
      object-fit: cover;
    }
    .podium-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #f1f5f9; }
    .podium-rating { font-size: 24px; font-weight: 800; color: #ff6b00; }
    .podium-rating-label { font-size: 10px; color: #64748b; letter-spacing: 1px; margin-top: 3px; }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 12px; }
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      background: #13161e;
      border-radius: 12px;
      overflow: hidden;
      min-width: 560px;
    }
    .leaderboard-table thead tr {
      background: #1a1e2a;
      border-bottom: 1px solid #2a2e3d;
    }
    .leaderboard-table th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .leaderboard-table td {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1e2a;
      font-size: 14px;
    }
    .leaderboard-table tbody tr:last-child td { border-bottom: none; }
    .leaderboard-table tbody tr:hover { background: #1a1e2a; transition: background 0.15s; }

    .player-cell { display: flex; align-items: center; gap: 12px; }
    .player-avatar {
      width: 38px; height: 38px;
      border-radius: 6px;
      background: #2a2e3d;
      object-fit: cover;
    }
    .player-name { font-weight: 600; color: #f1f5f9; }
    .player-steam { font-size: 11px; color: #64748b; }

    .rank-badge {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px;
    }
    .r1 { background: rgba(255,215,0,0.15); color: #FFD700; }
    .r2 { background: rgba(192,192,192,0.15); color: #C0C0C0; }
    .r3 { background: rgba(205,127,50,0.15); color: #CD7F32; }
    .rn { background: #1a1e2a; color: #64748b; }

    .rating-val { font-weight: 800; font-size: 16px; color: #ff6b00; }
    .null-val { color: #2a2e3d; }

    .leetify-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #2a2e3d;
      border-radius: 4px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .leetify-link:hover { border-color: #ff6b00; color: #ff6b00; }

    .loading {
      text-align: center;
      padding: 80px 0;
      color: #64748b;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2e3d;
      border-top-color: #ff6b00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center;
      padding: 40px;
      color: #ef4444;
      background: rgba(239,68,68,0.07);
      border-radius: 12px;
    }

    .attribution {
      text-align: center;
      margin-top: 32px;
      font-size: 12px;
      color: #475569;
    }
    .attribution a { color: #ff6b00; text-decoration: none; }
    .attribution a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .podium { flex-direction: column; align-items: center; }
      .podium-card { max-width: 100%; width: 100%; transform: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-cs">CS2</span>
      <span class="logo-lb">LEADERBOARD</span>
    </div>
    <button id="refreshBtn" onclick="loadLeaderboard()">
      &#x21BB; Aktualisieren
    </button>
  </div>
</header>

<main>
  <div class="updated-info" id="updatedAt"></div>
  <div id="container">
    <div class="loading">
      <div class="spinner"></div>
      <p>Lade Daten von Leetify...</p>
    </div>
  </div>
  <div class="attribution">
    Data provided by <a href="https://leetify.com" target="_blank">Leetify</a>
  </div>
</main>

<script>
  const PLAYERS = [
    { steamId64: "76561198212183875", displayName: "Lehon" },
    { steamId64: "76561198986416516", displayName: "Pata"  },
    { steamId64: "76561199208386886", displayName: "Zven"  }
  ];

  const PROXY = "https://corsproxy.io/?url=";
  const LEETIFY = "https://api.cs-prod.leetify.com/api/profile/";

  async function fetchPlayer(player) {
    try {
      const url = PROXY + encodeURIComponent(LEETIFY + player.steamId64);
      const res = await fetch(url);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();

      const meta = data.meta || {};
      const games = data.games || [];
      const recent = data.recentGames || [];

      const wins = games.filter(g => g.won === true).length;
      const winRate = games.length > 0 ? ((wins / games.length) * 100).toFixed(1) : null;
      const avgKd  = recent.length > 0 ? (recent.reduce((s,g) => s + (g.kdRatio||0), 0) / recent.length).toFixed(2) : null;
      const avgAdr = recent.length > 0 ? (recent.reduce((s,g) => s + (g.adr||0), 0) / recent.length).toFixed(1) : null;

      return {
        steamId64:    player.steamId64,
        displayName:  player.displayName,
        steamName:    meta.name || player.displayName,
        avatar:       meta.avatarUrl || null,
        premierRating: meta.csRating || null,
        kd:           avgKd,
        adr:          avgAdr,
        winRate:      winRate,
        totalGames:   games.length,
        leetifyUrl:   "https://leetify.com/app/profile/" + player.steamId64
      };
    } catch(e) {
      return {
        steamId64: player.steamId64,
        displayName: player.displayName,
        steamName: player.displayName,
        avatar: null,
        premierRating: null,
        kd: null, adr: null, winRate: null, totalGames: null,
        leetifyUrl: "https://leetify.com/app/profile/" + player.steamId64,
        error: true
      };
    }
  }

  async function loadLeaderboard() {
    const btn = document.getElementById("refreshBtn");
    const container = document.getElementById("container");
    btn.disabled = true;
    btn.textContent = "Lรคdt...";
    container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Lade Daten von Leetify...</p></div>';

    const results = await Promise.all(PLAYERS.map(fetchPlayer));
    const sorted  = results.sort((a,b) => (b.premierRating||0) - (a.premierRating||0));

    document.getElementById("updatedAt").textContent =
      "Zuletzt aktualisiert: " + new Date().toLocaleString("de-DE");

    render(sorted);
    btn.disabled = false;
    btn.textContent = "โ�ป Aktualisieren";
  }

  function val(v, suffix) {
    if (v == null) return '<span class="null-val">โ€”</span>';
    return v + (suffix||"");
  }

  function render(players) {
    const container = document.getElementById("container");
    const medals = ["๐�ฅ�","๐�ฅ�","๐�ฅ�"];
    const rankClass = ["r1","r2","r3"];

    // Podium (top 3, order: 2nd - 1st - 3rd)
    const top3 = players.slice(0,3);
    const order = top3.length === 3 ? [1,0,2] : top3.map((_,i)=>i);
    let podium = '<div class="podium">';
    order.forEach(i => {
      if (!top3[i]) return;
      const p = top3[i];
      const r = i + 1;
      podium += `
        <div class="podium-card rank-${r}">
          <div class="podium-medal">${medals[i]||"#"+r}</div>
          ${p.avatar ? `<img class="podium-avatar" src="${p.avatar}" onerror="this.style.visibility='hidden'"/>` : '<div class="podium-avatar"></div>'}
          <div class="podium-name">${p.displayName}</div>
          <div class="podium-rating">${p.premierRating != null ? p.premierRating.toLocaleString("de-DE") : "โ€”"}</div>
          <div class="podium-rating-label">CS RATING</div>
        </div>`;
    });
    podium += '</div>';

    // Table
    let rows = "";
    players.forEach((p, idx) => {
      const rc = rankClass[idx] || "rn";
      rows += `
        <tr>
          <td><div class="rank-badge ${rc}">${idx+1}</div></td>
          <td>
            <div class="player-cell">
              ${p.avatar ? `<img class="player-avatar" src="${p.avatar}" onerror="this.style.visibility='hidden'"/>` : '<div class="player-avatar"></div>'}
              <div>
                <div class="player-name">${p.displayName}</div>
                ${p.steamName !== p.displayName ? `<div class="player-steam">${p.steamName}</div>` : ""}
              </div>
            </div>
          </td>
          <td>${p.premierRating != null ? `<span class="rating-val">${p.premierRating.toLocaleString("de-DE")}</span>` : '<span class="null-val">โ€”</span>'}</td>
          <td>${val(p.kd)}</td>
          <td>${val(p.adr)}</td>
          <td>${val(p.winRate, "%")}</td>
          <td><a class="leetify-link" href="${p.leetifyUrl}" target="_blank">Leetify โ�—</a></td>
        </tr>`;
    });

    const table = `
      <div class="table-wrap">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>#</th><th>Spieler</th><th>Premier Rating</th>
              <th>K/D</th><th>ADR</th><th>Win Rate</th><th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

    container.innerHTML = (top3.length > 0 ? podium : "") + table;
  }

  loadLeaderboard();
</script>
</body>
</html>
